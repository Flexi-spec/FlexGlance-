<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>FlexGlance | Live Weather Intelligence</title>
<meta name="description" content="FlexGlance is a weather app providing real-time updates on temperature, wind, UV index, and rain forecasts with a clean, responsive design.">
<link rel="icon" type="image/jpeg" href="favicon.jpg">

<meta property="og:type" content="website">
<meta property="og:title" content="FlexGlance OS — Command Center">
<meta property="og:description" content="Check the live 24h trend and atmospheric data for your location.">
<meta property="og:image" content="https://images.unsplash.com/photo-1504608524841-42fe6f032b4b?w=1200">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.263.0/umd/lucide.min.js"></script>
<script src="https://unpkg.com/aos@next/dist/aos.js"></script>

<style>
:root {
    --bg: #050810;
    --card: rgba(15, 23, 42, 0.8);
    --card-strong: rgba(255, 255, 255, 0.12);
    --accent: #38bdf8;
    --border: rgba(255, 255, 255, 0.08);
    --text: #f8fafc;
    --muted: #b8c2df;
    --radius: 24px;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body {
    font-family:'Plus Jakarta Sans',sans-serif;
    background: radial-gradient(1200px 700px at 70% -10%, #1a2b5c 0%, #0b1220 60%), var(--bg);
    color: var(--text);
    min-height:100vh;
    overflow-x:hidden;
}

.header-bar {
    position:fixed; top:0; width:100%; height:70px;
    display:flex; justify-content:space-between; align-items:center;
    padding:0 20px; background: rgba(5,8,16,0.9);
    backdrop-filter: blur(15px); z-index:2000; border-bottom:1px solid var(--border);
}
.hamburger { width:30px; height:20px; display:flex; flex-direction:column; justify-content:space-between; cursor:pointer; z-index:3000; }
.hamburger span { width:100%; height:3px; background:var(--text); border-radius:10px; transition:0.4s; }
.hamburger.open span:nth-child(1){ transform: translateY(8.5px) rotate(45deg); }
.hamburger.open span:nth-child(2){ opacity:0; }
.hamburger.open span:nth-child(3){ transform: translateY(-8.5px) rotate(-45deg); }

.side-menu {
    position:fixed; top:0; right:-100%; width:80%; height:100%;
    background: var(--bg); z-index:2500; transition:0.5s cubic-bezier(0.4,0,0.2,1);
    display:flex; flex-direction:column; padding:100px 40px; gap:30px;
    border-left:1px solid var(--border);
}
.side-menu.active { right:0; }

.container { padding:90px 20px 40px; max-width:1100px; margin:0 auto; display:flex; flex-direction:column; gap:20px; }
.bento { display:grid; grid-template-columns:repeat(2,1fr); gap:15px; }
@media(min-width:768px){ .bento{ grid-template-columns:repeat(4,1fr); } }

.tile { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:24px; backdrop-filter:blur(10px); }
.hero { grid-column: span 2; text-align:left; position:relative; }
.temp-huge { font-size:clamp(60px,10vw,90px); font-weight:800; letter-spacing:-4px; color:var(--accent); margin:10px 0; }

.btn { border:none; background:var(--card-strong); color:var(--text); padding:12px 18px; border-radius:12px; cursor:pointer; font-weight:600; }
.input { flex:1; background:var(--card); border:1px solid var(--border); color:white; padding:15px; border-radius:15px; outline:none; }
#radar { height:300px; border-radius:20px; margin-top:15px; z-index:1; }
.chip { background:var(--card-strong); padding:8px 12px; border-radius:999px; font-size:13px; display:inline-block; margin:4px; }
.day-card { background:var(--card); padding:15px; border-radius:18px; display:flex; justify-content:space-between; align-items:center; border:1px solid var(--border); }
.status-footer { text-align:center; color:var(--muted); font-size:12px; margin-top:20px; }
</style>
</head>
<body>

<header class="header-bar">
    <div style="font-weight:800; font-size:20px; display:flex; align-items:center; gap:8px;">
        <span style="background:var(--accent); color:#000; padding:2px 8px; border-radius:8px;">FG</span> FLEXGLANCE
    </div>
    <div class="hamburger" id="hamb"><span></span><span></span><span></span></div>
</header>

<nav class="side-menu" id="menu">
    <button class="btn" style="background:var(--accent); color:#000; width:100%;" onclick="nativeShare()">SHARE THIS VIEW</button>
    <button class="btn" id="unitToggle" onclick="toggleUnits()">TOGGLE °C/°F</button>
    <button class="btn" onclick="locateMe()">USE MY LOCATION</button>
</nav>

<main class="container">
    <div style="display:flex; gap:10px;" data-aos="fade-down">
        <input type="text" id="citySearch" class="input" placeholder="Search City...">
        <button onclick="searchAndLoad()" class="btn" style="background:var(--accent); color:#000;"><i data-lucide="search"></i></button>
    </div>

    <div class="bento">
        <div class="tile hero" data-aos="zoom-in">
            <h2 id="placeLabel">Detecting...</h2>
            <div id="dateLabel" style="color:var(--muted); font-size:14px;">---</div>
            <div class="temp-huge" id="tempLabel">--°</div>
            <div id="descLabel" style="font-weight:800; text-transform:uppercase; letter-spacing:1px;">---</div>
            <div style="margin-top:15px;">
                <span class="chip" id="feelsLabel">Feels --</span>
                <span class="chip" id="windLabel">Wind --</span>
                <span class="chip" id="uvLabel">UV --</span>
            </div>
        </div>

        <div class="tile" style="grid-column: span 2;" data-aos="fade-up">
            <p style="font-size:12px; font-weight:800; color:var(--accent); margin-bottom:10px;">24H TEMPERATURE VELOCITY</p>
            <canvas id="tempChart" height="140"></canvas>
        </div>

        <div class="tile" style="grid-column: span 2;" data-aos="fade-up">
            <p style="font-size:12px; font-weight:800; margin-bottom:10px;">PRECISION SATELLITE RADAR</p>
            <div id="radar"></div>
        </div>

        <div class="tile" style="grid-column: span 2;" data-aos="fade-left">
            <p style="font-size:12px; font-weight:800; margin-bottom:15px;">EXTENDED FORECAST</p>
            <div id="forecastContainer" style="display:flex; flex-direction:column; gap:10px;"></div>
        </div>
    </div>

    <footer class="status-footer">
        <p id="statusTxt">System Operational</p>
        <p style="opacity:0.5; margin-top:5px;">FLEXGLANCE OS v3.0</p>
    </footer>
</main>

<script>
let state = { lat:0, lon:0, unit:'metric', map:null, chart:null, weatherMarkers:[] };

window.onload = () => {
    lucide.createIcons();
    AOS.init({duration:800, once:true});
    initRadar();
    initHamb();
    locateMe();
};

function initHamb(){
    const h=document.getElementById('hamb');
    const m=document.getElementById('menu');
    h.onclick=()=>{ h.classList.toggle('open'); m.classList.toggle('active'); };
}

function initRadar(){
    state.map=L.map('radar',{zoomControl:true}).setView([0,0],2);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(state.map);
    state.map.on('click', e => {
        state.lat=e.latlng.lat; state.lon=e.latlng.lng; fetchWeather();
    });
}

async function fetchWeather(){
    document.getElementById('statusTxt').innerText="Syncing with satellites...";
    const url=`https://api.open-meteo.com/v1/forecast?latitude=${state.lat}&longitude=${state.lon}&current_weather=true&hourly=temperature_2m,precipitation&daily=temperature_2m_max,temperature_2m_min,precipitation_sum,weathercode&timezone=auto&forecast_days=2`;
    try{
        const res=await fetch(url);
        const data=await res.json();
        if(!data.current_weather) throw new Error("No current weather data");

        const cur=data.current_weather;
        renderUI(cur, data.hourly, data.daily);
        renderRadarMarkers(data.hourly);
    }catch(err){
        console.error(err);
        document.getElementById('statusTxt').innerText="Link failed.";
    }
}

function renderUI(cur, hourly, daily){
    const unit=state.unit==='metric'?'°C':'°F';
    const temp=state.unit==='metric'?cur.temperature:(cur.temperature*9/5+32);
    document.getElementById('placeLabel').innerText=`Lat:${state.lat.toFixed(2)} Lon:${state.lon.toFixed(2)}`;
    document.getElementById('dateLabel').innerText=new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
    document.getElementById('tempLabel').innerText=`${Math.round(temp)}${unit}`;
    document.getElementById('descLabel').innerText=codeMap[cur.weathercode]||"Stable Conditions";
    document.getElementById('windLabel').innerText=`Wind ${cur.windspeed} km/h`;
    document.getElementById('uvLabel').innerText=`UV ${cur.uv||'N/A'}`;
    document.getElementById('feelsLabel').innerText=`Feels ${Math.round(temp)}${unit}`;

    renderChart(hourly);
    renderForecast(daily);
    document.getElementById('statusTxt').innerText="Data Secure ✓";
}

function renderChart(hourly){
    const temps=hourly.temperature_2m.slice(0,24).map(t=>state.unit==='metric'?t:(t*9/5+32));
    const ctx=document.getElementById('tempChart').getContext('2d');
    if(state.chart) state.chart.destroy();
    state.chart=new Chart(ctx,{
        type:'line',
        data:{labels:Array.from({length:temps.length},(_,i)=>`${i}:00`), datasets:[{data:temps,borderColor:'#38bdf8',tension:0.4,fill:true,backgroundColor:'rgba(56,189,248,0.1)',pointRadius:0}]},
        options:{responsive:true,plugins:{legend:{display:false}}, scales:{y:{display:true}, x:{grid:{display:false}, ticks:{color:'#64748b',maxRotation:0}}}}
    });
}

function renderForecast(daily){
    const container=document.getElementById('forecastContainer');
    container.innerHTML='';
    const labels=["Today","Tomorrow","Day After"];
    for(let i=0;i<3;i++){
        const high=state.unit==='metric'?daily.temperature_2m_max[i]:(daily.temperature_2m_max[i]*9/5+32);
        container.innerHTML+=`<div class="day-card"><span>${labels[i]}</span><span style="font-weight:800;color:var(--accent)">${Math.round(high)}°</span><span style="font-size:12px;opacity:0.6">${daily.precipitation_sum[i]}mm Rain</span></div>`;
    }
}

function renderRadarMarkers(hourly){
    state.weatherMarkers.forEach(m=>state.map.removeLayer(m));
    state.weatherMarkers=[];
    for(let i=0;i<hourly.time.length;i+=3){
        const precip=hourly.precipitation[i]||0;
        const lat=state.lat+(Math.random()-0.5)*5;
        const lon=state.lon+(Math.random()-0.5)*5;
        if(precip>0){
            const marker=L.marker([lat,lon]).addTo(state.map).bindPopup(`Rain: ${precip}mm`);
            state.weatherMarkers.push(marker);
        }
    }
}

function locateMe(){
    if(navigator.geolocation){
        navigator.geolocation.getCurrentPosition(p=>{
            state.lat=p.coords.latitude; state.lon=p.coords.longitude;
            state.map.setView([state.lat,state.lon],5);
            fetchWeather();
        },()=>alert("Location access denied. Allow location to get global weather data."));
    } else alert("Geolocation not supported.");
}

function toggleUnits(){ state.unit=state.unit==='metric'?'imperial':'metric'; fetchWeather(); }

async function nativeShare(){
    const shareData={title:'FlexGlance OS', text:`Weather at Lat:${state.lat.toFixed(2)} Lon:${state.lon.toFixed(2)}: ${document.getElementById('tempLabel').innerText}`, url:window.location.href};
    try{ await navigator.share(shareData); } catch(e){ navigator.clipboard.writeText(window.location.href); alert("Link copied to clipboard!"); }
}

async function searchAndLoad(){
    const q=document.getElementById('citySearch').value;
    if(!q) return alert("Enter a city name");
    const res=await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${q}&count=1`);
    const data=await res.json();
    if(data.results && data.results.length){
        state.lat=data.results[0].latitude; state.lon=data.results[0].longitude;
        state.map.setView([state.lat,state.lon],5);
        fetchWeather();
    } else alert("City not found");
}

const codeMap={0:"Clear Sky",1:"Mainly Clear",2:"Partly Cloudy",3:"Overcast",45:"Foggy",61:"Rainy",95:"Thunderstorm"};
</script>
</body>
</html>
